spring.application.name=USERS-SERVICE


# DATABASE CONFIG SETUP
spring.datasource.url=jdbc:postgresql://localhost:5432/userService
spring.datasource.username=Goku
spring.datasource.password=Goku
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


# PREFIX URL
server.servlet.context-path=/user


# RabbitMQ Setup
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.exchange.name=e-commerce
rabbitmq.notification.queue=notify_queue
rabbitmq.notification.binding_key=notify_key


# Redis Setup
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms



